name: Release

# Fires when a stable semver tag is pushed (e.g. v0.1.0, v0.2.0, v1.0.0).
# Pre-release / suffixed tags (e.g. v1.0.0-android, v0.1.0-rc1) are intentionally
# excluded via the `!contains(github.ref_name, '-')` guard so the mobile artifact
# and any future release-candidate tags do not auto-publish a stable release.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required for `gh release create`

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Extract release notes for this tag
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
